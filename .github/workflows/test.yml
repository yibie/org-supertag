name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The package's declared minimum is Emacs 28.1 (see Package-Requires
        # in org-supertag.el), but jcs090218/setup-emacs on Linux is more
        # reliable installing 28.2 than 28.1, so we test against 28.2 as the
        # floor plus the current stable release.
        emacs_version: ['28.2', '29.4']

    steps:
      - uses: actions/checkout@v4

      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install elisp dependencies
        # org >= 9.6 from GNU ELPA matches Package-Requires: Emacs 28.2
        # bundles org 9.5.x, below the package's declared minimum, and that
        # gap produced a real scanner difference on CI (clone-rebuild found
        # 0 nodes on 28.2 while 29.4 passed).
        run: |
          emacs -batch --eval "(progn (require 'package) (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\")) (package-initialize) (package-refresh-contents) (package-install 'ht) (unless (package-installed-p 'org \"9.6\") (package-install (cadr (assq 'org package-archive-contents)))))"

      # test/run-tests.sh is already tracked with mode 100755 in git
      # (verified via `git ls-files -s test/run-tests.sh`), so no chmod
      # step is needed here.
      - name: Run tests
        run: ./test/run-tests.sh all

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-emacs-${{ matrix.emacs_version }}
          path: test/test-results.txt
