name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the declared minimum (Package-Requires: emacs 29.1, which
        # also bundles org 9.6) plus the current stable release.
        emacs_version: ['29.1', '29.4']

    steps:
      - uses: actions/checkout@v4

      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install elisp dependencies
        # Emacs 29.1+ bundles org >= 9.6, satisfying Package-Requires; the
        # guarded org install stays as a safety net should the floor or the
        # runner image ever drift.
        run: |
          emacs -batch --eval "(progn (require 'package) (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\")) (package-initialize) (package-refresh-contents) (package-install 'ht) (unless (package-installed-p 'org '(9 6)) (package-install (cadr (assq 'org package-archive-contents)))))"

      # test/run-tests.sh is already tracked with mode 100755 in git
      # (verified via `git ls-files -s test/run-tests.sh`), so no chmod
      # step is needed here.
      - name: Run tests
        run: ./test/run-tests.sh all

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-emacs-${{ matrix.emacs_version }}
          path: test/test-results.txt
